services:
  sync:
    build:
      context: .
      dockerfile: sync.Dockerfile
    volumes:
      - ${VAULT_PATH:-./vault}:/vault:rw
      - ob_config:/root/.config/obsidian-headless
    restart: unless-stopped

  mcp:
    build: .
    expose:
      - "3456"
    volumes:
      - ${VAULT_PATH:-./vault}:/vault:ro
    environment:
      - VAULT_PATH=/vault
      - API_KEY=${API_KEY}
      - PORT=3456
      - HOST=0.0.0.0
    depends_on:
      - sync
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:-obsidian.hanzpo.com}
    depends_on:
      - mcp
    restart: unless-stopped

volumes:
  ob_config:
  caddy_data:
  caddy_config:
